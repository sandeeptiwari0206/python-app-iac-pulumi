name: Deploy to EKS (Pulumi)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: python-app-cluster
  ECR_BACKEND_REPO: python-app/backend
  ECR_FRONTEND_REPO: python-app/frontend

jobs:

  # -----------------------------------
  # 1. PROVISION INFRA (PULUMI)
  # -----------------------------------
  provision-infra:
    name: "1. Provision EKS Infrastructure (Pulumi)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      # Install dependencies
      - name: Install Python dependencies
        working-directory: ./infra-pulumi
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Debug requirements
      - name: Debug requirements file
        run: |
          echo "===== REQUIREMENTS FILE ====="
          cat infra-pulumi/requirements.txt

      # Clean Pulumi venv
      - name: Clean Pulumi venv
        working-directory: ./infra-pulumi
        run: rm -rf venv

      # Run Pulumi
      - name: Run Pulumi Up
        working-directory: ./infra-pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PULUMI_PYTHON_CMD: python3
        run: |
          pulumi stack select dev --create
          pulumi up --yes --skip-preview

      - name: Show Outputs
        working-directory: ./infra-pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: pulumi stack output

  # -----------------------------------
  # 2. BUILD & PUSH IMAGES
  # -----------------------------------
  build-and-push:
    name: "2. Build & Push Docker Images"
    runs-on: ubuntu-latest
    needs: provision-infra

    outputs:
      backend_image: ${{ steps.out.outputs.backend_image }}
      frontend_image: ${{ steps.out.outputs.frontend_image }}
      image_tag: ${{ steps.out.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ FIXED ECR LOGIN
      - name: Login to ECR + set tag
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION=${{ env.AWS_REGION }}

          echo "ACCOUNT_ID=$ACCOUNT_ID"
          echo "REGION=$REGION"

          ECR_REGISTRY=${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV

          aws ecr get-login-password --region $REGION | \
          docker login --username AWS --password-stdin $ECR_REGISTRY

          IMAGE_TAG=${GITHUB_SHA::8}
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Build & push backend
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }}:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }}:$IMAGE_TAG

      - name: Build & push frontend
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_FRONTEND_REPO }}:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/${{ env.ECR_FRONTEND_REPO }}:$IMAGE_TAG

      - name: Set outputs
        id: out
        run: |
          echo "backend_image=$ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }}:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "frontend_image=$ECR_REGISTRY/${{ env.ECR_FRONTEND_REPO }}:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  # -----------------------------------
  # 3. DEPLOY TO EKS
  # -----------------------------------
  deploy:
    name: "3. Deploy to EKS"
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect kubectl to EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Inject images into k8s manifests
        run: |
          sed -i "s|BACKEND_IMAGE_PLACEHOLDER|${{ needs.build-and-push.outputs.backend_image }}|g" k8s/02-backend.yaml
          sed -i "s|FRONTEND_IMAGE_PLACEHOLDER|${{ needs.build-and-push.outputs.frontend_image }}|g" k8s/03-frontend.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl apply -f k8s/01-mongodb.yaml
          kubectl apply -f k8s/02-backend.yaml
          kubectl apply -f k8s/03-frontend.yaml

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/backend -n python-app --timeout=5m
          kubectl rollout status deployment/frontend -n python-app --timeout=5m

      - name: Print App URL
        run: kubectl get svc frontend -n python-app
