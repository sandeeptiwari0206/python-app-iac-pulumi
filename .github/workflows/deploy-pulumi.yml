  provision-infra:
    name: "1. Provision EKS Infrastructure (Pulumi)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      # ✅ FIX 1: Upgrade pip + install deps properly
      - name: Install Python dependencies
        working-directory: ./infra-pulumi
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ FIX 2: Ensure pulumi-aws exists (IMPORTANT)
      - name: Ensure pulumi-aws installed
        working-directory: ./infra-pulumi
        run: pip install pulumi-aws

      # ✅ FIX 3: Run Pulumi with correct env
      - name: Run Pulumi Up
        working-directory: ./infra-pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PYTHONPATH: .
        run: |
          pulumi stack select dev --create
          pulumi up --yes --skip-preview

      - name: Show Outputs
        working-directory: ./infra-pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: pulumi stack output